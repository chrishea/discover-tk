<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Discover Cloudcroft</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0D1B2A">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pine-deep: #1565C0;
            --sky-pale: #E3F2FD;
            --cloud-white: #FAFCFE;
            --text-dark: #1A1A1A;
            --text-light: #6B6B6B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--text-dark);
            background: var(--cloud-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .offline-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
        }

        .offline-icon svg {
            width: 100%;
            height: 100%;
        }

        h1 {
            font-family: 'Alegreya', serif;
            font-weight: 700;
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 480px;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        .retry-btn {
            display: inline-block;
            background: var(--pine-deep);
            color: #fff;
            padding: 0.85rem 2rem;
            border: none;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s ease;
        }

        .retry-btn:hover {
            background: #0D47A1;
        }

        .cached-pages {
            margin-top: 2.5rem;
            text-align: left;
            max-width: 360px;
        }

        .cached-pages h2 {
            font-family: 'Alegreya', serif;
            font-size: 1.2rem;
            margin-bottom: 0.75rem;
            color: var(--text-dark);
        }

        .cached-pages ul {
            list-style: none;
            padding: 0;
        }

        .cached-pages li {
            margin-bottom: 0.5rem;
        }

        .cached-pages a {
            color: var(--pine-deep);
            text-decoration: none;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .cached-pages a:hover {
            text-decoration: underline;
        }

        .mountain-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            opacity: 0.06;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="offline-icon">
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Mountain -->
            <polygon points="60,15 100,85 20,85" fill="#1565C0" opacity="0.2"/>
            <polygon points="35,40 65,85 5,85" fill="#0D47A1" opacity="0.15"/>
            <polygon points="85,45 110,85 60,85" fill="#0D47A1" opacity="0.15"/>
            <!-- Snow cap -->
            <polygon points="60,15 68,28 52,28" fill="#1565C0" opacity="0.3"/>
            <!-- Cloud with X -->
            <ellipse cx="60" cy="52" rx="28" ry="16" fill="#CBD5E1"/>
            <ellipse cx="42" cy="56" rx="16" ry="12" fill="#CBD5E1"/>
            <ellipse cx="78" cy="56" rx="16" ry="12" fill="#CBD5E1"/>
            <!-- X mark -->
            <line x1="52" y1="46" x2="68" y2="62" stroke="#BF0A30" stroke-width="3" stroke-linecap="round"/>
            <line x1="68" y1="46" x2="52" y2="62" stroke="#BF0A30" stroke-width="3" stroke-linecap="round"/>
            <!-- Trees -->
            <polygon points="25,85 28,75 31,85" fill="#2E7D32" opacity="0.3"/>
            <polygon points="90,85 93,76 96,85" fill="#2E7D32" opacity="0.3"/>
        </svg>
    </div>

    <h1>You're Offline</h1>
    <p>It looks like you've lost your connection up here in the mountains. Check your internet and try again.</p>

    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>

    <div class="cached-pages" id="cachedPages" style="display:none;">
        <h2>Available Offline</h2>
        <ul id="cachedList"></ul>
    </div>

    <svg class="mountain-bg" viewBox="0 0 1200 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,200 200,60 400,120 600,30 800,100 1000,50 1200,80 1200,200" fill="#1565C0"/>
    </svg>

    <script>
        // Show cached pages that are available offline
        if ('caches' in window) {
            caches.keys().then(function(names) {
                var allMatches = [];
                return Promise.all(
                    names.map(function(name) {
                        return caches.open(name).then(function(cache) {
                            return cache.keys();
                        });
                    })
                ).then(function(requestArrays) {
                    var pageNames = {
                        'index.html': 'Home',
                        'activities.html': 'Activities',
                        'attractions.html': 'Attractions',
                        'dining.html': 'Dining',
                        'lodging.html': 'Lodging',
                        'hiking-trails.html': 'Hiking Trails',
                        'about.html': 'About Cloudcroft',
                        'contact.html': 'Contact',
                        'faq.html': 'FAQ',
                        'spring.html': 'Spring Guide',
                        'summer.html': 'Summer Guide',
                        'fall.html': 'Fall Guide',
                        'winter.html': 'Winter Guide',
                        'shopping.html': 'Shopping',
                        'camping.html': 'Camping',
                        'biking.html': 'Biking',
                        'dark-skies.html': 'Dark Skies',
                        'pickleball.html': 'Pickleball',
                        'nearby-destinations.html': 'Nearby Destinations',
                    };

                    var seen = {};
                    var list = document.getElementById('cachedList');

                    requestArrays.forEach(function(requests) {
                        requests.forEach(function(req) {
                            var url = new URL(req.url);
                            var path = url.pathname.replace(/^\//, '');
                            if (path === '') path = 'index.html';
                            if (pageNames[path] && !seen[path]) {
                                seen[path] = true;
                                var li = document.createElement('li');
                                var a = document.createElement('a');
                                a.href = '/' + path;
                                a.textContent = pageNames[path];
                                li.appendChild(a);
                                list.appendChild(li);
                            }
                        });
                    });

                    if (list.children.length > 0) {
                        document.getElementById('cachedPages').style.display = 'block';
                    }
                });
            });
        }
    </script>
</body>
</html>
